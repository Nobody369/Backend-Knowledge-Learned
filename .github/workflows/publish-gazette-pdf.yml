name: Publish Backend Odyssey Gazette PDF

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 */3 * *"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Build latest issue PDF
        run: npm run build:pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-odyssey-gazette-pdf
          path: dist/pdf/*.pdf

      - name: Email latest PDF
        if: ${{ secrets.RESEND_API_KEY != '' && secrets.ODYSSEY_TO_EMAIL != '' && secrets.ODYSSEY_FROM_EMAIL != '' }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ODYSSEY_TO_EMAIL: ${{ secrets.ODYSSEY_TO_EMAIL }}
          ODYSSEY_FROM_EMAIL: ${{ secrets.ODYSSEY_FROM_EMAIL }}
        run: npm run send:latest
